<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>老婆今天吃药没</title>
<!-- iOS PWA 配置 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="吃药没">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffd8b8">
<link rel="apple-touch-icon" href="images/dog.png">
<link rel="icon" href="images/dog.png">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Long+Cang&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    font-family: "ZCOOL KuaiLe", "PingFang SC", sans-serif;
    user-select: none;
  }

  /* ========== 页面容器 ========== */
  .page {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.5s, transform 0.5s;
  }
  .page.hidden { opacity: 0; pointer-events: none; transform: scale(0.95); }

  /* ========== 封面（页面1） ========== */
  #cover {
    background: url('images/sky.png') center/cover no-repeat, linear-gradient(180deg, #7ec8f0 0%, #b8e0f5 60%, #e6f4fb 100%);
    flex-direction: column;
    image-rendering: pixelated;
  }
  #cover.night {
    background: url('images/night.png') center/cover no-repeat, linear-gradient(180deg, #1a2f5c 0%, #2a4680 60%, #3a5a9c 100%);
  }
  /* 云朵 */
  .cloud {
    position: absolute; background: white; border-radius: 50%;
    opacity: 0.85; filter: blur(0.5px);
    animation: float 8s ease-in-out infinite;
  }
  .cloud::before, .cloud::after {
    content: ''; position: absolute; background: white; border-radius: 50%;
  }
  .c1 { width: 80px; height: 80px; top: 8%; left: 10%; }
  .c1::before { width: 60px; height: 60px; top: 20px; left: -30px; }
  .c1::after { width: 70px; height: 70px; top: 10px; left: 50px; }
  .c2 { width: 100px; height: 100px; top: 12%; right: 15%; animation-delay: 2s; }
  .c2::before { width: 70px; height: 70px; top: 30px; left: -40px; }
  .c2::after { width: 80px; height: 80px; top: 15px; left: 60px; }
  .c3 { width: 60px; height: 60px; top: 40%; left: 5%; animation-delay: 4s; }
  .c3::before { width: 45px; height: 45px; top: 15px; left: -25px; }
  .c4 { width: 70px; height: 70px; top: 35%; right: 8%; animation-delay: 1s; }
  .c4::before { width: 50px; height: 50px; top: 20px; left: 45px; }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }
  /* 星星 */
  .star { position: absolute; color: #fff9c4; font-size: 20px; animation: twinkle 2s infinite; }
  .s1 { top: 15%; left: 30%; animation-delay: 0s; }
  .s2 { top: 8%; left: 55%; animation-delay: 0.5s; }
  .s3 { top: 20%; right: 30%; animation-delay: 1s; }
  @keyframes twinkle {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  /* 木牌标题 */
  .signboard {
    background: linear-gradient(180deg, #d4a574 0%, #b8834a 100%);
    padding: 30px 60px;
    border: 6px solid #6d4423;
    border-radius: 12px;
    box-shadow:
      inset 0 0 0 3px #e8c896,
      0 8px 0 #5a3818,
      0 12px 20px rgba(0,0,0,0.3);
    position: relative;
    animation: sway 4s ease-in-out infinite;
  }
  @keyframes sway {
    0%, 100% { transform: rotate(-1deg); }
    50% { transform: rotate(1deg); }
  }
  .signboard::before, .signboard::after {
    content: '🌿'; position: absolute; top: -15px; font-size: 30px;
  }
  .signboard::before { left: 10px; transform: rotate(-20deg); }
  .signboard::after { right: 10px; transform: rotate(20deg); }
  .signboard h1 {
    font-size: 64px; color: #4a2c15;
    text-shadow: 2px 2px 0 #e8c896, 4px 4px 0 rgba(0,0,0,0.2);
    letter-spacing: 8px;
  }

  /* 开始按钮 */
  .start-btn {
    margin-top: 50px;
    background: linear-gradient(180deg, #e8c896 0%, #c9a06a 100%);
    padding: 20px 60px;
    border: 5px solid #6d4423;
    border-radius: 8px;
    box-shadow: inset 0 0 0 2px #f5e0b8, 0 6px 0 #5a3818;
    cursor: pointer;
    font-family: inherit;
    font-size: 42px;
    color: #4a2c15;
    letter-spacing: 6px;
    transition: transform 0.1s;
  }
  .start-btn:active {
    transform: translateY(4px);
    box-shadow: inset 0 0 0 2px #f5e0b8, 0 2px 0 #5a3818;
  }

  .cover-days {
    margin-top: 40px;
    font-size: 24px;
    color: #4a2c15;
    background: rgba(255, 255, 255, 0.7);
    padding: 10px 30px;
    border-radius: 30px;
    border: 3px solid #6d4423;
  }

  /* 封面飞行物 */
  .flyer {
    position: absolute;
    pointer-events: none;
    z-index: 1;
    opacity: 0;
  }
  .flyer.balloon { width: 140px; }
  .flyer.paper   { width: 130px; }
  .flyer.plane   { width: 150px; }
  .flyer.balloon.flying { animation: flyBalloon 22s linear forwards; }
  .flyer.paper.flying   { animation: flyDownLeft 18s linear forwards; }
  .flyer.plane.flying   { animation: flyDownLeft 20s linear forwards; }
  @keyframes flyBalloon {
    0%   { transform: translate(0, 0)         rotate(-3deg); opacity: 0; }
    10%  {                                                   opacity: 1; }
    90%  {                                                   opacity: 1; }
    100% { transform: translate(80vw, -110vh) rotate(3deg);  opacity: 0; }
  }
  @keyframes flyDownLeft {
    0%   { transform: translate(0, 0)         rotate(6deg);  opacity: 0; }
    10%  {                                                   opacity: 1; }
    90%  {                                                   opacity: 1; }
    100% { transform: translate(-120vw, 90vh) rotate(-6deg); opacity: 0; }
  }

  /* ========== 主界面（页面2） ========== */
  #main {
    background: linear-gradient(180deg, #ffd8b8 0%, #ffc9a0 100%);
  }
  .main-inner {
    width: 92%; height: 88%;
    display: grid;
    grid-template-columns: 200px 1fr 240px;
    gap: 24px;
    padding: 20px;
  }

  /* 左侧药丸列 */
  .pills {
    display: flex; flex-direction: column; justify-content: space-around;
    background: rgba(255, 255, 255, 0.6);
    border: 4px solid #6d4423;
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 6px 0 #5a3818;
  }
  .pill {
    display: flex; align-items: center; gap: 12px;
    cursor: pointer;
    padding: 8px;
    border-radius: 12px;
    transition: transform 0.15s;
  }
  .pill:active { transform: scale(0.92); }
  .pill-shape {
    width: 56px; height: 36px;
    border-radius: 18px;
    border: 3px solid #333;
    box-shadow: inset -3px -3px 0 rgba(0,0,0,0.15), 0 3px 0 rgba(0,0,0,0.2);
    position: relative;
    flex-shrink: 0;
  }
  .pill-shape::after {
    content: ''; position: absolute; top: 6px; left: 10px;
    width: 10px; height: 6px; background: rgba(255,255,255,0.6);
    border-radius: 50%;
  }
  .pill-blue .pill-shape { background: #5aa9e6; }
  .pill-yellow .pill-shape { background: #ffd93d; }
  .pill-white .pill-shape { background: #f5f5f5; }
  .pill-pink .pill-shape { background: #ff9ec4; }
  .pill-count {
    font-size: 32px; color: #4a2c15;
    font-family: "ZCOOL KuaiLe", sans-serif;
  }
  .pill.done { opacity: 0.5; }
  .pill.done .pill-shape::before {
    content: '✓'; position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #2d7a2d; font-size: 28px; font-weight: bold;
    text-shadow: 1px 1px 0 white;
  }

  /* 中间房间 */
  .room {
    position: relative;
    background: url('images/room.png') center/cover no-repeat, #d4a374;
    border: 5px solid #6d4423;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 0 #5a3818, inset 0 0 40px rgba(0,0,0,0.1);
    image-rendering: pixelated;
  }
  .room.night {
    background: url('images/night_room.png') center/cover no-repeat, #2a3050;
  }
  .room.night.surprise {
    background: url('images/surprise.png') center/cover no-repeat, #2a3050;
  }
  /* 窗户 */
  .window {
    position: absolute; top: 12%; left: 20%;
    width: 22%; height: 32%;
    background: linear-gradient(180deg, #7ec8f0 0%, #b8e0f5 100%);
    border: 4px solid #6d4423;
    border-radius: 4px;
  }
  .window::before, .window::after {
    content: ''; position: absolute; background: #6d4423;
  }
  .window::before { top: 0; bottom: 0; left: 50%; width: 3px; margin-left: -1.5px; }
  .window::after { left: 0; right: 0; top: 50%; height: 3px; margin-top: -1.5px; }
  /* 相框 */
  .picture {
    position: absolute; top: 15%; right: 20%;
    width: 15%; height: 22%;
    background: linear-gradient(135deg, #7ec8a8 0%, #a8d8b8 100%);
    border: 6px solid #6d4423;
    border-radius: 4px;
  }
  .picture::after {
    content: '🌸'; position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
  }
  /* 盆栽 */
  .plant {
    position: absolute; bottom: 40%; right: 5%;
    font-size: 48px;
  }
  /* 台灯 */
  .lamp {
    position: absolute; top: 5%; left: 8%;
    font-size: 40px;
  }
  /* 小狗 */
  .dog {
    position: absolute; bottom: -28%; left: 45%; transform: translateX(-50%);
    width: 70%; height: auto;
    animation: dogBreath 3s ease-in-out infinite;
    cursor: pointer;
    z-index: 2;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
  }
  @keyframes dogBreath {
    0%, 100% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.04); }
  }
  .dog.jump { animation: dogJump 0.6s; }
  @keyframes dogJump {
    0%, 100% { transform: translateX(-50%) translateY(0) scale(1); }
    50% { transform: translateX(-50%) translateY(-40px) scale(1.1); }
  }
  /* 小狗对话气泡 */
  .dog-bubble {
    position: absolute;
    bottom: 44%;
    left: 53%;
    background: white;
    border: 4px solid #6d4423;
    border-radius: 20px;
    padding: 20px 32px;
    font-size: 25px;
    color: #4a2c15;
    box-shadow: 0 4px 0 #5a3818;
    max-width: 340px;
    width: max-content;
    word-break: break-word;
    line-height: 1.4;
    text-align: center;
    z-index: 3;
    animation: bubbleBob 2.5s ease-in-out infinite;
  }
  .dog-bubble::before {
    content: '';
    position: absolute;
    bottom: -14px; left: 20px;
    width: 0; height: 0;
    border: 10px solid transparent;
    border-top-color: #6d4423;
    border-bottom: 0;
  }
  .dog-bubble::after {
    content: '';
    position: absolute;
    bottom: -8px; left: 24px;
    width: 0; height: 0;
    border: 7px solid transparent;
    border-top-color: white;
    border-bottom: 0;
  }
  @keyframes bubbleBob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  @keyframes dogBreath {
    0%, 100% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.05); }
  }
  .dog.jump { animation: dogJump 0.6s; }
  @keyframes dogJump {
    0%, 100% { transform: translateX(-50%) translateY(0) scale(1); }
    50% { transform: translateX(-50%) translateY(-40px) scale(1.1); }
  }

  /* 右侧文案 */
  .quote-box {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(255, 255, 255, 0.7);
    border: 4px solid #6d4423;
    border-radius: 16px;
    padding: 24px 20px;
    box-shadow: 0 6px 0 #5a3818;
    text-align: center;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .quote-box:active { transform: scale(0.97); }
  .quote-box .quote {
    font-family: "Long Cang", "ZCOOL KuaiLe", cursive;
    font-size: 26px; line-height: 1.7;
    color: #4a2c15;
    transition: opacity 0.25s;
  }
  .quote-box .quote.fade { opacity: 0; }
  .quote-box .signature {
    margin-top: 20px;
    font-size: 18px;
    color: #8b5a2b;
  }
  .quote-box .hint {
    margin-top: 10px;
    font-size: 14px;
    color: #b58860;
    opacity: 0.7;
  }

  /* 底部天数条 */
  .days-bar {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(255, 255, 255, 0.85);
    padding: 10px 40px;
    border: 3px solid #6d4423;
    border-radius: 30px;
    font-size: 22px;
    color: #4a2c15;
    box-shadow: 0 4px 0 #5a3818;
  }

  /* 返回按钮 */
  .back-btn {
    position: absolute; top: 20px; left: 20px;
    background: rgba(255, 255, 255, 0.8);
    border: 3px solid #6d4423;
    border-radius: 50%;
    width: 50px; height: 50px;
    font-size: 24px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 0 #5a3818;
  }
  .back-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #5a3818; }

  /* 爱心飘出动画 */
  .heart {
    position: absolute; font-size: 32px;
    pointer-events: none;
    animation: heartFloat 1.2s ease-out forwards;
  }
  @keyframes heartFloat {
    0% { opacity: 1; transform: translateY(0) scale(0.5); }
    100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
  }

  /* 庆祝彩带 */
  .confetti {
    position: absolute; width: 10px; height: 20px;
    animation: confettiFall 3s linear forwards;
    pointer-events: none;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-50px) rotate(0); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* 完成提示 */
  .done-toast {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: rgba(255, 255, 255, 0.95);
    border: 5px solid #ff9ec4;
    border-radius: 24px;
    padding: 40px 80px;
    font-size: 48px;
    color: #d4577a;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    z-index: 100;
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .done-toast.show { transform: translate(-50%, -50%) scale(1); }
</style>
</head>
<body>

<!-- 页面1：封面 -->
<div id="cover" class="page">
  <img class="flyer balloon" src="images/fly_v11.png" style="left:-15%; top:75%;" alt="">
  <img class="flyer paper"   src="images/fly_v12.png" style="right:-15%; top:8%;" alt="">
  <img class="flyer plane"   src="images/fly_v13.png" style="right:-15%; top:5%;" alt="">
  <div class="signboard">
    <h1>老婆今天吃药没</h1>
  </div>
  <button class="start-btn" onclick="goMain()">开始</button>
  <div class="cover-days" id="coverDays">已经吃药 0 天啦 🌸</div>
</div>

<!-- 页面2：主界面 -->
<div id="main" class="page hidden">
  <button class="back-btn" onclick="goCover()">←</button>
  <div class="main-inner">
    <!-- 药丸列 -->
    <div class="pills">
      <div class="pill pill-blue" data-color="blue" data-total="3" onclick="takePill(this)">
        <div class="pill-shape"></div>
        <div class="pill-count">0/3</div>
      </div>
      <div class="pill pill-yellow" data-color="yellow" data-total="2" onclick="takePill(this)">
        <div class="pill-shape"></div>
        <div class="pill-count">0/2</div>
      </div>
      <div class="pill pill-white" data-color="white" data-total="2" onclick="takePill(this)">
        <div class="pill-shape"></div>
        <div class="pill-count">0/2</div>
      </div>
      <div class="pill pill-pink" data-color="pink" data-total="1" onclick="takePill(this)">
        <div class="pill-shape"></div>
        <div class="pill-count">0/1</div>
      </div>
    </div>

    <!-- 房间 -->
    <div class="room" id="room">
      <div class="dog-bubble" id="dogBubble" style="display:none"></div>
      <img class="dog" id="dog" src="images/dog.png" alt="狗狗" onclick="petDog(event)">
    </div>

    <!-- 文案 -->
    <div class="quote-box" onclick="nextQuote()">
      <div class="quote" id="quote">今天也要乖乖吃药喔 ♡</div>
      <div class="signature">—— 爱你的老公</div>
    </div>
  </div>

  <div class="days-bar" id="mainDays">已经吃药 0 天啦 💕</div>
  <div class="done-toast" id="doneToast">今天完成啦！💕</div>
</div>

<script>
  // ========== 数据 ==========
  const QUOTES = [
    "别委屈自己了 小笨蛋",
    "隔着这么远你老公还是在好好想你哦",
    "一想到今晚的月亮是你几个小时前看到的，我不由得喜欢起它来",
    "小笨蛋一天到晚的别只想着别人，要好好珍惜自己",
    "今天什么都不想干，想要的只有你的温柔乡",
    "什么都要给你最好的……所有都是……对吧？",
    "今天来到你身边，依偎在你的阴影下，我开始审视自己的孤独，发现它更孤独了",
    "想把你揉进怀里，一点缝隙都不留",
    "今天不想聊天，只想安静地把你亲一遍",
    "你要是在我旁边，这会儿肯定被我压着不许动",
    "隔这么远，只能靠想象你在我怀里的样子撑过今晚",
    "想你想到失眠，能不能让我抱着你的声音睡",
    "今晚不许穿太多睡觉，我远程盯着",
    "等你回来，第一件事就是把你按在门口亲够",
    "我不是馋你身子，我是馋你整个人——身子也算在里面",
    "每次视频都想隔着屏幕把你捞过来",
    "药是治病的，你才是治我的",
    "想你想到人有点燥热，空气有点潮湿",
    "你身上到底是什么味道，我在家翻箱倒柜找不到，我是怎样上的瘾？",
    "爱你三万遍，不够不够——"
  ];

  // 美东时间"逻辑日期"：以凌晨 3 点作为分界（03:00 前算前一天）
  const TODAY = () => {
    const parts = new Intl.DateTimeFormat('en-CA', {
      timeZone: 'America/New_York',
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', hour12: false
    }).formatToParts(new Date());
    const y = parts.find(p => p.type === 'year').value;
    const m = parts.find(p => p.type === 'month').value;
    const d = parts.find(p => p.type === 'day').value;
    const h = parseInt(parts.find(p => p.type === 'hour').value);
    // 若当前美东小时 < 3，日期回退一天
    if (h < 3) {
      const dt = new Date(`${y}-${m}-${d}T00:00:00Z`);
      dt.setUTCDate(dt.getUTCDate() - 1);
      return dt.toISOString().slice(0, 10);
    }
    return `${y}-${m}-${d}`;
  };

  // 获取美东时间的小时数（自动处理夏令时）
  function etHour() {
    const parts = new Intl.DateTimeFormat('en-US', {
      timeZone: 'America/New_York',
      hour: '2-digit', minute: '2-digit', hour12: false
    }).formatToParts(new Date());
    const h = parseInt(parts.find(p => p.type === 'hour').value);
    const m = parseInt(parts.find(p => p.type === 'minute').value);
    return h + m / 60;
  }

  // 每剂药定义：
  //   固定窗口：start-end（美东小时）
  //   条件窗口：dependsOn 某剂被吃后，delay 小时开始，持续 duration 小时
  //             若依赖未满足则不催；依赖窗口结束后视为错过
  const DOSES = [
    { key: 'blue-1',   color: 'blue',   threshold: 1, start: 6,  end: 11, msg: '我想吃蓝色药丸 💙' },
    { key: 'blue-2',   color: 'blue',   threshold: 2, start: 12, end: 14, msg: '我想吃蓝色药丸 💙' },
    { key: 'white-1',  color: 'white',  threshold: 1, dependsOn: 'blue-2', delay: 0.5, duration: 2, msg: '我想吃白色细长药片 🤍' },
    { key: 'yellow-1', color: 'yellow', threshold: 1, start: 12, end: 14, msg: '我想吃黄色药片 💛' },
    { key: 'blue-3',   color: 'blue',   threshold: 3, start: 17, end: 19, msg: '我想吃蓝色药丸 💙' },
    { key: 'white-2',  color: 'white',  threshold: 2, dependsOn: 'blue-3', delay: 0.5, duration: 2, msg: '我想吃白色细长药片 🤍' },
    { key: 'yellow-2', color: 'yellow', threshold: 2, start: 17, end: 19, msg: '我想吃黄色药片 💛' },
    { key: 'pink-1',   color: 'pink',   threshold: 1, start: 21, end: 23, msg: '我想吃粉色药片 🌸' }
  ];

  function doseWindow(d, taken) {
    if (d.dependsOn) {
      const t = taken[d.dependsOn];
      if (t == null) return null;
      return { start: t + d.delay, end: t + d.delay + d.duration };
    }
    return { start: d.start, end: d.end };
  }

  // 根据美东时间 + 当前进度，返回小狗气泡该说什么。null = 隐藏气泡。
  // 多个活跃时 start 越晚（越新）优先
  function getReminder(state) {
    const h = etHour();
    const p = state.todayProgress;
    const taken = state.doseTakenAt || {};
    const active = [];
    for (const d of DOSES) {
      if ((p[d.color] || 0) >= d.threshold) continue;
      const w = doseWindow(d, taken);
      if (!w) continue;
      if (h >= w.start && h < w.end) active.push({ d, start: w.start });
    }
    if (active.length === 0) return null;
    active.sort((a, b) => b.start - a.start);
    return active[0].d.msg;
  }

  // 小狗闲话（点击小狗且当前没有该催的药时，从中随机一句）

  function updateBubble() {
    const bubble = document.getElementById('dogBubble');
    const msg = getReminder(state);
    if (msg === null) {
      bubble.style.display = 'none';
    } else {
      bubble.style.display = '';
      bubble.textContent = msg;
    }
  }

  // 根据美东时间切封面 + 主界面房间背景：18:00-06:00 用夜景
  function updateCoverTheme() {
    const h = etHour();
    const isNight = h < 6 || h >= 18;
    document.getElementById('cover').classList.toggle('night', isNight);
    const room = document.getElementById('room');
    room.classList.toggle('night', isNight);
    if (!isNight) room.classList.remove('surprise');
  }

  // 晚上有 10% 概率显示 "小狗趴窗" 惊喜版房间，每次进入 room 界面掷一次
  const SURPRISE_CHANCE = 0.1;
  function rollSurprise() {
    const h = etHour();
    const isNight = h < 6 || h >= 18;
    const room = document.getElementById('room');
    room.classList.remove('surprise');
    if (isNight && Math.random() < SURPRISE_CHANCE) {
      room.classList.add('surprise');
      setTimeout(() => room.classList.remove('surprise'), 2000);
    }
  }

  function loadState() {
    const raw = localStorage.getItem('drugState');
    const today = TODAY();
    let state = raw ? JSON.parse(raw) : {
      firstDay: today,
      lastDay: null,
      completedDays: 0,
      todayProgress: {},
      doseTakenAt: {},
      todayDone: false
    };
    if (state.completedDays == null) state.completedDays = 0;
    if (state.lastDay !== today) {
      // 跨天：若昨天全部吃完，累计天数 +1
      if (state.todayDone) state.completedDays += 1;
      state.lastDay = today;
      state.todayProgress = { blue: 0, yellow: 0, white: 0, pink: 0 };
      state.doseTakenAt = {};
      state.todayDone = false;
      saveState(state);
    }
    return state;
  }

  function saveState(state) {
    localStorage.setItem('drugState', JSON.stringify(state));
  }

  function completedDaysLabel(state) {
    return state.completedDays;
  }

  let state = loadState();

  // ========== 渲染 ==========
  function render() {
    const days = state.completedDays || 0;
    document.getElementById('coverDays').innerHTML = `已经吃药 <b>${days}</b> 天啦 🌸`;
    document.getElementById('mainDays').innerHTML = `已经吃药 <b>${days}</b> 天啦 💕`;

    document.querySelectorAll('.pill').forEach(pill => {
      const color = pill.dataset.color;
      const total = parseInt(pill.dataset.total);
      const cur = state.todayProgress[color] || 0;
      pill.querySelector('.pill-count').textContent = `${cur}/${total}`;
      pill.classList.toggle('done', cur >= total);
    });

    // 每天默认一句情话（跨天会换）
    const quoteIdx = (new Date(TODAY()).getTime() / 86400000) % QUOTES.length | 0;
    document.getElementById('quote').textContent = QUOTES[quoteIdx];

    // 更新小狗提醒气泡 + 封面昼夜主题
    updateBubble();
    updateCoverTheme();
  }

  // 点击换一句（避免连续两次一样）
  let lastQuoteIdx = -1;
  function nextQuote() {
    const el = document.getElementById('quote');
    let idx;
    do { idx = Math.floor(Math.random() * QUOTES.length); }
    while (idx === lastQuoteIdx && QUOTES.length > 1);
    lastQuoteIdx = idx;
    el.classList.add('fade');
    setTimeout(() => {
      el.textContent = QUOTES[idx];
      el.classList.remove('fade');
    }, 250);
  }

  // ========== 音乐播放（只在主界面 room 时播放） ==========
  const MUSIC_DAY = [
    'music/day/Cloud Watching.mp3',
    "music/day/It's Going To Be A Good Day.mp3",
    'music/day/Look On The Bright Side.mp3'
  ];
  const MUSIC_NIGHT = [
    'music/night/Quiet Night.mp3',
    'music/night/Taking a Bath And Jumping Into Bed.mp3'
  ];
  const audio = new Audio();
  audio.volume = 0.5;
  let lastMusicIdx = -1;
  function pickTrack() {
    const h = etHour();
    const isNight = h < 6 || h >= 18;
    const pool = isNight ? MUSIC_NIGHT : MUSIC_DAY;
    let idx;
    do { idx = Math.floor(Math.random() * pool.length); }
    while (idx === lastMusicIdx && pool.length > 1);
    lastMusicIdx = idx;
    return pool[idx];
  }
  audio.addEventListener('ended', () => {
    audio.src = pickTrack();
    audio.play().catch(() => {});
  });
  function startMusic() {
    if (!audio.src) audio.src = pickTrack();
    audio.play().catch(() => {});
  }
  function stopMusic() {
    audio.pause();
  }

  // ========== 交互 ==========
  function goMain() {
    document.getElementById('cover').classList.add('hidden');
    document.getElementById('main').classList.remove('hidden');
    rollSurprise();
    startMusic();
  }
  function goCover() {
    document.getElementById('main').classList.add('hidden');
    document.getElementById('cover').classList.remove('hidden');
    stopMusic();
  }

  function takePill(el) {
    const color = el.dataset.color;
    const total = parseInt(el.dataset.total);
    const cur = state.todayProgress[color] || 0;
    if (cur >= total) return;

    const newCount = cur + 1;
    state.todayProgress[color] = newCount;
    // 记录该 dose 的实际吃药时刻（美东小时），用于依赖窗口判断
    if (!state.doseTakenAt) state.doseTakenAt = {};
    const key = color + '-' + newCount;
    state.doseTakenAt[key] = etHour();
    saveState(state);
    render();

    // 爱心动画
    spawnHearts(el);
    // 药丸弹跳
    el.style.transform = 'scale(1.2)';
    setTimeout(() => el.style.transform = '', 200);

    // 检查是否全部完成
    checkAllDone();
  }

  function spawnHearts(el) {
    const rect = el.getBoundingClientRect();
    for (let i = 0; i < 3; i++) {
      const h = document.createElement('div');
      h.className = 'heart';
      h.textContent = ['💕', '💖', '💝', '❤️'][i % 4];
      h.style.left = (rect.left + rect.width / 2 + (Math.random() - 0.5) * 40) + 'px';
      h.style.top = rect.top + 'px';
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 1200);
    }
  }

  let chatterTimer = null;
  let petCount = 0;
  let restingUntil = 0;
  function petDog(e) {
    const dog = document.getElementById('dog');
    dog.classList.remove('jump');
    void dog.offsetWidth;
    dog.classList.add('jump');
    spawnHearts(dog);

    const bubble = document.getElementById('dogBubble');
    const now = Date.now();

    // 累了阶段：20 秒内点她只回"累了 让我休息一下"
    if (now < restingUntil) {
      bubble.textContent = '累了 让我休息一下 😪';
      bubble.style.display = '';
      clearTimeout(chatterTimer);
      chatterTimer = setTimeout(() => {
        if (Date.now() >= restingUntil && getReminder(state) === null) {
          bubble.style.display = 'none';
        }
      }, 3500);
      return;
    }

    // 有该催的药 → 保留提醒；否则计数 + 说话
    const reminder = getReminder(state);
    if (reminder !== null) return;

    petCount++;
    let line;
    if (petCount >= 25) {
      line = '怎么一直是我在说！我老公呢！！！！！';
      restingUntil = now + 20000; // 之后 20 秒进入 "累了" 状态
      petCount = 0;
    } else {
      line = DOG_CHATTER[Math.floor(Math.random() * DOG_CHATTER.length)];
    }
    bubble.textContent = line;
    bubble.style.display = '';
    clearTimeout(chatterTimer);
    chatterTimer = setTimeout(() => {
      if (Date.now() >= restingUntil && getReminder(state) === null) {
        bubble.style.display = 'none';
      } else if (getReminder(state) !== null) {
        updateBubble();
      }
    }, 3500);
  }

  function checkAllDone() {
    const allDone = ['blue', 'yellow', 'white', 'pink'].every(c => {
      const el = document.querySelector(`.pill-${c}`);
      return (state.todayProgress[c] || 0) >= parseInt(el.dataset.total);
    });
    if (allDone && !state.todayDone) {
      state.todayDone = true;
      saveState(state);
      celebrate();
    }
  }

  function celebrate() {
    const toast = document.getElementById('doneToast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);

    // 彩带
    const colors = ['#ff9ec4', '#ffd93d', '#5aa9e6', '#7ec8a8', '#c9a06a'];
    for (let i = 0; i < 60; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.background = colors[i % colors.length];
      c.style.left = Math.random() * 100 + '%';
      c.style.top = '-20px';
      c.style.animationDelay = Math.random() * 1.5 + 's';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4500);
    }

    // 小狗跳
    const dog = document.getElementById('dog');
    dog.classList.remove('jump');
    void dog.offsetWidth;
    dog.classList.add('jump');
  }

  render();

  // 封面飞行物调度：一次一个，飞完等 5-15 秒随机再来一个
  const flyerClasses = ['balloon', 'paper', 'plane'];
  const flyerDurations = { balloon: 22000, paper: 18000, plane: 20000 };
  function scheduleNextFlyer() {
    const delay = 5000 + Math.random() * 10000; // 5-15 秒
    setTimeout(() => {
      const cls = flyerClasses[Math.floor(Math.random() * flyerClasses.length)];
      const el = document.querySelector('.flyer.' + cls);
      if (el) {
        el.classList.remove('flying');
        void el.offsetWidth;
        el.classList.add('flying');
        setTimeout(() => {
          el.classList.remove('flying');
          scheduleNextFlyer();
        }, flyerDurations[cls] + 500);
      } else {
        scheduleNextFlyer();
      }
    }, delay);
  }
  setTimeout(scheduleNextFlyer, 3000);

  // 跨天自动重置：每分钟检查一次日期
  setInterval(() => {
    if (state.lastDay !== TODAY()) {
      state = loadState();
      render();
    } else {
      updateBubble();
      updateCoverTheme();
    }
  }, 60 * 1000);
</script>
